name: Déploiement Automatisé - GitHub Pages

on:
  push:
    branches:
      - main
      - master # Supporte la branche par défaut de votre dépôt

permissions:
  contents: write # Requis pour pousser l'application buildée vers la branche gh-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Élimine les avertissements de dépréciation Node.js 20 au niveau global

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🟢 Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Utilise Node.js 22 LTS moderne et stable

      - name: 📦 Installation des dépendances
        run: npm install

      - name: ⚙️ Compilation de l'application (Build)
        run: npm run build

      - name: 🚀 Déploiement sur GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Dossier statique généré par Vite
          branch: gh-pages # Branche cible pour l'hébergment GitHub Pages
          clean: true # Nettoie les anciens fichiers obsolètes sur la branche cible
